# Optional snippet — include in the Qadbak HTTPS server { } block:
#   include /opt/qadbak/deploy/nginx-panel-security.conf;
#
# For login rate limits, add to http {} in nginx.conf:
#   limit_req_zone $binary_remote_addr zone=qadbak_login:10m rate=5r/m;
# and in server { }:  limit_req zone=qadbak_login burst=3 nodelay;  (on /api/auth/login)

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;
