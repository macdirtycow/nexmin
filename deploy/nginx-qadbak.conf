# Qadbak is the public front door on ports 80/443 (IP, server hostname, or panel domain).
# VirtualMin/Webmin stays on :10000 for API + embedded admin — not the default homepage.
#
# Install: install/qadbak-install.sh substitutes __PANEL_HOST__ and __SERVER_FQDN__
# Manual:  sed -e 's/__PANEL_HOST__/qadbak.com/g' -e 's/__SERVER_FQDN__/server.example.com/g'

# --- HTTP: known hostnames → HTTPS panel ---
server {
    listen 80;
    listen [::]:80;
    server_name __PANEL_HOST__ www.__PANEL_HOST__ __SERVER_FQDN__;
    return 301 https://__PANEL_HOST__$request_uri;
}

# --- HTTP: bare IP or unknown Host → Qadbak (no VirtualMin) ---
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- HTTPS: panel domain + server FQDN → Qadbak ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __PANEL_HOST__ __SERVER_FQDN__;

    ssl_certificate     /etc/letsencrypt/live/__PANEL_HOST__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__PANEL_HOST__/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# www → apex
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.__PANEL_HOST__;
    ssl_certificate     /etc/letsencrypt/live/__PANEL_HOST__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__PANEL_HOST__/privkey.pem;
    return 301 https://__PANEL_HOST__$request_uri;
}
