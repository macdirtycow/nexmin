# Nginx reverse proxy for Nexmin at https://nexmin.net
# Place in /etc/nginx/sites-available/nexmin and symlink to sites-enabled.
# Certbot: certbot certonly --nginx -d nexmin.net -d www.nexmin.net

server {
    listen 80;
    server_name nexmin.net www.nexmin.net;
    return 301 https://nexmin.net$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.nexmin.net;
    return 301 https://nexmin.net$request_uri;
}

server {
    listen 443 ssl http2;
    server_name nexmin.net;

    ssl_certificate     /etc/letsencrypt/live/nexmin.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nexmin.net/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
